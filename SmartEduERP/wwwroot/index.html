<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>SmartEduERP</title>
    <base href="/" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="SmartEduERP.styles.css" />
    <link rel="stylesheet" href="app.css" />
</head>

<body>
    <div id="app">
        <div class="container mt-5 text-center">
            <div class="spinner-border text-primary" role="status">
                <span class="visually-hidden">Loading...</span>
            </div>
            <p class="mt-3">Loading application...</p>
        </div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="" class="reload">Reload</a>
        <a class="dismiss">🗙</a>
    </div>

    <script src="_framework/blazor.webview.js" autostart="false"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- Add this custom JavaScript for chart creation -->
    <script>
        // Global object to store chart instances
        window.chartInstances = {};

        // Function to create or update charts
        window.createChart = (canvasId, config) => {
            const canvas = document.getElementById(canvasId);
            if (!canvas) {
                console.error('Canvas element not found:', canvasId);
                return;
            }

            const ctx = canvas.getContext('2d');

            // Destroy existing chart if it exists
            if (window.chartInstances[canvasId]) {
                window.chartInstances[canvasId].destroy();
            }

            try {
                // Create new chart instance
                window.chartInstances[canvasId] = new Chart(ctx, config);
                console.log('Chart created successfully:', canvasId);
            } catch (error) {
                console.error('Error creating chart:', canvasId, error);
            }
        };

        // Function to destroy a specific chart
        window.destroyChart = (canvasId) => {
            if (window.chartInstances[canvasId]) {
                window.chartInstances[canvasId].destroy();
                delete window.chartInstances[canvasId];
            }
        };

        // Function to destroy all charts
        window.destroyAllCharts = () => {
            Object.keys(window.chartInstances).forEach(canvasId => {
                window.chartInstances[canvasId].destroy();
            });
            window.chartInstances = {};
        };

        // Initialize when document is ready
        document.addEventListener('DOMContentLoaded', function () {
            console.log('Chart.js initialized successfully');
        });
    </script>
</body>
</html>
